apiVersion: apps/v1
kind: Deployment

metadata:
  name: springboot-deployment
  labels:
    app: springboot

spec:
  replicas: 2

  selector:
    matchLabels:
      app: springboot

  template:
    metadata:
      labels:
        app: springboot

    spec:
      containers:
      - name: springboot-container
        image: srinathraj08/tl:latest

        ports:
        - containerPort: 8080
